name: Bundle Skia Source with Dependencies

on:
  workflow_dispatch:
    inputs:
      skia_branch:
        description: 'Skia branch to bundle (e.g. chrome/m144)'
        required: false
        default: 'chrome/m144'
        type: string

jobs:
  bundle:
    runs-on: ubuntu-latest
    permissions:
      contents: write      # 用于创建 Release
    env:
      DEPOT_TOOLS_UPDATE: 0
      SKIA_BRANCH: ${{ github.event.inputs.skia_branch || 'chrome/m144' }}

    steps:
      - name: Install system tools
        run: |
          sudo apt-get update
          sudo apt-get install -y python3 git zstd

      - name: Clone depot_tools
        run: |
          git clone --depth 1 https://chromium.googlesource.com/chromium/tools/depot_tools.git

      - name: Clone Skia (${{ env.SKIA_BRANCH }})
        run: |
          export PATH="$PWD/depot_tools:$PATH"
          git clone -b "$SKIA_BRANCH" --depth 1 https://skia.googlesource.com/skia.git

      - name: Sync third-party dependencies
        run: |
          export PATH="$PWD/depot_tools:$PATH"
          cd skia
          python3 tools/git-sync-deps

      - name: Strip all .git folders (keep only source code)
        run: |
          cd skia
          find . -name ".git" -type d -exec rm -rf {} + 2>/dev/null || true

      - name: Create compressed archive
        run: |
          DATE=$(date +%Y%m%d)
          SAFE_BRANCH=$(echo "$SKIA_BRANCH" | tr '/' '-')
          echo "DATE=$DATE" >> $GITHUB_ENV
          echo "SAFE_BRANCH=$SAFE_BRANCH" >> $GITHUB_ENV
          # zstd 多线程压缩，等级 3，-T0 使用所有 CPU 核心
          tar -I "zstd -T0 -3" -cf "skia-source-${SAFE_BRANCH}-${DATE}.tar.zst" skia

      - name: Upload archive to Release
        uses: softprops/action-gh-release@v1
        with:
          tag_name: skia-source-${{ env.SAFE_BRANCH }}-${{ github.run_id }}
          name: "Skia Source ${{ env.SKIA_BRANCH }} (run ${{ github.run_id }})"
          body: |
            📦 **Skia source bundle with all third-party dependencies synchronized.**

            - Branch: `${{ env.SKIA_BRANCH }}`
            - Ready for offline building (no network required)
            - Usage: extract → `bin/gn gen out/Static ...` → `ninja -C out/Static`
          files: skia-source-${{ env.SAFE_BRANCH }}-${{ env.DATE }}.tar.zst
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
